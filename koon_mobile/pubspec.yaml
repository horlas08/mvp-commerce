name: koon_mobile
description: "Koon Commerce - Shop globally, delivered locally"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  badges: ^3.1.2
  flutter_staggered_grid_view: ^0.7.0
  lottie: ^3.3.1

  # State Management & Navigation
  get: ^4.7.2
  animated_theme_switcher: ^2.0.10
  image_picker: ^1.1.2

  # Localization
  easy_localization: ^3.0.7+1

  # Networking
  dio: ^5.8.0+1

  # Filesystem (for HTML source dumps during webview development)
  path_provider: ^2.1.4

  # Auth
  google_sign_in: ^6.2.2
  shared_preferences: ^2.5.3

  # WebView (existing)
  flutter_inappwebview: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.6
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/
